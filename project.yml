name: TripForge
options:
  bundleIdPrefix: com.rajkumar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "YES"
    SWIFT_VERSION: "5.0"
    # Set your Apple Developer Team ID here (or pass DEVELOPMENT_TEAM=XXXXXXXXXX
    # on the xcodebuild command line) to enable signing for device/TestFlight builds.
    DEVELOPMENT_TEAM: "Y62BAT7CF4"
targets:
  TripForge:
    type: application
    platform: iOS
    sources:
      - path: TripForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rajkumar.tripforge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: TripForge
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSCalendarsUsageDescription: "TripForge adds your itinerary events to your calendar."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "TripForge adds your itinerary events to your calendar."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        # Simulator / local dev: no signing required.
        Debug:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGN_IDENTITY: ""
        # Device / Archive / TestFlight: automatic signing.
        # Open the project in Xcode (signed into your Apple ID) and Archive —
        # Xcode will create the App Store distribution profile for you.
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: "YES"
