name: TripForge
options:
  bundleIdPrefix: com.rajkumar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your Apple Developer Team ID here (or pass DEVELOPMENT_TEAM=XXXXXXXXXX
    # on the xcodebuild command line) to enable signing for device/TestFlight builds.
    DEVELOPMENT_TEAM: "Y62BAT7CF4"
targets:
  TripForge:
    type: application
    platform: iOS
    sources:
      - path: TripForge
    # Explicit Info.plist (not auto-generated) so we can declare the iPad-only
    # orientation variant. iPad apps must support all four orientations for
    # multitasking, while iPhone stays portrait-only.
    info:
      path: TripForge/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: TripForge
        UIUserInterfaceStyle: Dark
        NSCalendarsUsageDescription: "TripForge adds your itinerary events to your calendar."
        NSCalendarsFullAccessUsageDescription: "TripForge adds your itinerary events to your calendar."
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rajkumar.tripforge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        # Simulator / local dev: no signing at all.
        # MANUAL style so Xcode never tries to auto-generate a development
        # profile (this team has no registered devices, so that always fails).
        Debug:
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
        # Device / Archive / TestFlight: MANUAL App Store distribution signing.
        # Needs NO registered device — just install the "TripForge App Store"
        # provisioning profile (see TESTFLIGHT.md, Path C). Until it's installed,
        # Xcode shows "profile not found" (harmless) instead of trying to make a
        # development profile.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: "YES"
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "TripForge App Store"
