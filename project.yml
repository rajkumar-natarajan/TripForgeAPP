name: TripForge
options:
  bundleIdPrefix: com.rajkumar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: "NO"
    GENERATE_INFOPLIST_FILE: "YES"
    SWIFT_VERSION: "5.0"
targets:
  TripForge:
    type: application
    platform: iOS
    sources:
      - path: TripForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rajkumar.tripforge
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: TripForge
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSCalendarsUsageDescription: "TripForge adds your itinerary events to your calendar."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "TripForge adds your itinerary events to your calendar."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
